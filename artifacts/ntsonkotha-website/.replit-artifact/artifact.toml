kind = "web"
previewPath = "/"
title = "Ntsonkotha Senior Secondary School"
version = "1.0.0"
id = "artifacts/ntsonkotha-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21520

[services.development]
run = "pnpm --filter @workspace/ntsonkotha-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ntsonkotha-website", "run", "build" ]
publicDir = "artifacts/ntsonkotha-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21520"
BASE_PATH = "/"
