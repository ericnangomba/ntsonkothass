[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/ntsonkotha-website run build"
  publish = "artifacts/ntsonkotha-website/dist"

[build.environment]
  NODE_VERSION = "22"
  NODE_ENV = "production"
  BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
